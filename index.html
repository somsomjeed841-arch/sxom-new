<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SXOM JEXM</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#d8ccc2;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
}

.container{
width:400px;
background:#f3eee9;
padding:30px;
border-radius:20px;
box-shadow:0 20px 40px rgba(0,0,0,0.2);
}

h1{
text-align:center;
margin-bottom:20px;
color:#3e2f27;
}

input{
width:100%;
padding:12px;
margin-bottom:12px;
border:none;
border-radius:10px;
background:#e8dfd8;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#3e2f27;
color:white;
cursor:pointer;
margin-top:10px;
}

button:hover{
opacity:.9;
}

.switch{
text-align:center;
margin-top:15px;
font-size:14px;
cursor:pointer;
color:#3e2f27;
}

.hidden{
display:none;
}

.error{
color:red;
font-size:13px;
margin-bottom:10px;
}

</style>
</head>

<body>

<div class="container">

<div id="loginBox">

<h1>Login</h1>

<input id="loginEmail" placeholder="Email">
<input id="loginPass" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<div class="switch" onclick="showRegister()">
Create account
</div>

</div>


<div id="registerBox" class="hidden">

<h1>Register</h1>

<input id="regEmail" placeholder="Email">
<input id="regPass" type="password" placeholder="Password">
<input id="regPass2" type="password" placeholder="Confirm Password">

<div id="passError" class="error"></div>

<button onclick="register()">Register</button>

<div class="switch" onclick="showLogin()">
Back to login
</div>

</div>

</div>


<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="env.js"></script>

<script>

const supabase = window.supabase.createClient(
window.ENV.SUPABASE_URL,
window.ENV.SUPABASE_KEY
)

const loginBox = document.getElementById("loginBox")
const registerBox = document.getElementById("registerBox")


function showRegister(){
loginBox.classList.add("hidden")
registerBox.classList.remove("hidden")
}

function showLogin(){
registerBox.classList.add("hidden")
loginBox.classList.remove("hidden")
}


async function register(){

const email = document.getElementById("regEmail").value
const pass = document.getElementById("regPass").value
const pass2 = document.getElementById("regPass2").value

if(pass !== pass2){
document.getElementById("passError").innerText="Passwords do not match"
return
}

const {data,error} = await supabase.auth.signUp({
email:email,
password:pass
})

if(error){
alert(error.message)
return
}

await supabase.from("profiles").insert([{
id:data.user.id,
balance:0
}])

alert("Account created")

showLogin()

}


async function login(){

const email = document.getElementById("loginEmail").value
const pass = document.getElementById("loginPass").value

const {data,error} = await supabase.auth.signInWithPassword({
email:email,
password:pass
})

if(error){
alert(error.message)
return
}

localStorage.setItem("user",JSON.stringify(data.user))

window.location.h=“shop.html”

}
  </script>
</body>
</html>
