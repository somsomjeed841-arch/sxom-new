<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SXOM Auth</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI',sans-serif;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#d8ccc2;
}

.card{
  width:380px;
  padding:40px;
  border-radius:20px;
  background:#f3eee9;
  box-shadow:0 20px 40px rgba(0,0,0,0.15);
  text-align:center;
}

h2{
  margin-bottom:20px;
  color:#3e2f27;
}

input{
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:10px;
  border:1px solid #d4c4b8;
}

button{
  width:100%;
  padding:12px;
  margin-top:15px;
  border:none;
  border-radius:10px;
  background:#8c6b5a;
  color:white;
  font-weight:600;
  cursor:pointer;
}

.switch{
  margin-top:15px;
}

.switch span{
  color:#8c6b5a;
  cursor:pointer;
  font-weight:600;
}

.hidden{
  display:none;
}

.error{
  color:red;
  font-size:13px;
}
</style>

</head>
<body>

<div class="card">

<div id="loginBox">
<h2>Sign In</h2>

<input id="loginEmail" type="email" placeholder="Email">
<input id="loginPass" type="password" placeholder="Password">

<button onclick="login()">LOGIN</button>

<div class="switch">
Don't have account?
<span onclick="showRegister()">Create Account</span>
</div>

</div>

<div id="registerBox" class="hidden">

<h2>Create Account</h2>

<input id="regEmail" type="email" placeholder="Email">
<input id="regPass" type="password" placeholder="Password">
<input id="regPass2" type="password" placeholder="Confirm Password">

<div id="passError" class="error"></div>

<button onclick="register()">REGISTER</button>

<div class="switch">
Already have account?
<span onclick="showLogin()">Sign In</span>
</div>

</div>

</div>
<script src="env.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const supabase = window.supabase.createClient(
window.SUPABASE_URL,
window.SUPABASE_KEY
)

const loginBox = document.getElementById("loginBox")
const registerBox = document.getElementById("registerBox")

window.showRegister = function(){
loginBox.classList.add("hidden")
registerBox.classList.remove("hidden")
}

window.showLogin = function(){
registerBox.classList.add("hidden")
loginBox.classList.remove("hidden")
}

window.register = async function(){

const email = document.getElementById("regEmail").value
const pass = document.getElementById("regPass").value
const pass2 = document.getElementById("regPass2").value

if(pass !== pass2){
document.getElementById("passError").innerText="Passwords do not match"
return
}

const {data,error} = await supabase.auth.signUp({
email:email,
password:pass
})

if(error){
alert(error.message)
return
}

await supabase.from("users").insert([{
id:data.user.id,
email:email,
credit:0
}])

alert("Account created")

showLogin()

}

window.login = async function(){

const email = document.getElementById("loginEmail").value
const pass = document.getElementById("loginPass").value

const {data,error} = await supabase.auth.signInWithPassword({
email:email,
password:pass
})

if(error){
alert(error.message)
return
}

localStorage.setItem("user",JSON.stringify(data.user))

window.location.href="shop.html"

}

</script>

</body>
</html>
