<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SXOM Auth</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#d8ccc2;
}

.card{
width:380px;
padding:40px;
border-radius:20px;
background:#f3eee9;
box-shadow:
0 20px 40px rgba(0,0,0,0.15),
inset 0 1px 0 rgba(255,255,255,0.6);
text-align:center;
}

h2{
margin-bottom:20px;
font-weight:600;
color:#3e2f27;
}

input{
width:100%;
padding:12px;
margin:8px 0;
border-radius:10px;
border:1px solid #d4c4b8;
background:#fff;
outline:none;
}

button{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:10px;
background:#8c6b5a;
color:white;
font-weight:600;
cursor:pointer;
}

.switch{
margin-top:15px;
font-size:14px;
}

.switch span{
color:#8c6b5a;
cursor:pointer;
font-weight:600;
}

.hidden{
display:none;
}

.error{
color:red;
font-size:13px;
margin-top:5px;
}
</style>
</head>

<body>

<div class="card">

<div id="loginBox">
<h2>Sign In</h2>
<input id="loginEmail" type="email" placeholder="Email">
<input id="loginPass" type="password" placeholder="Password">
<button onclick="login()">LOGIN</button>

<div class="switch">
Don't have an account?
<span onclick="showRegister()">Create Account</span>
</div>
</div>

<div id="registerBox" class="hidden">
<h2>Create Account</h2>
<input id="regEmail" type="email" placeholder="Email">
<input id="regPass" type="password" placeholder="Password">
<input id="regPass2" type="password" placeholder="Confirm Password">

<div id="passError" class="error"></div>

<button onclick="register()">REGISTER</button>

<div class="switch">
Already have an account?
<span onclick="showLogin()">Sign In</span>
</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const supabase = window.supabase.createClient(
"https://uvbkeujfmzfhstxxpzvn.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV2YmtldWpmbXpmaHN0eHhwenZuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3MzA5NTYsImV4cCI6MjA4ODMwNjk1Nn0.91HhGLdQO_DpBP5mX0u8kX7W79YElGvJvLDVcxBNkCY"
)

function showRegister(){
loginBox.classList.add("hidden")
registerBox.classList.remove("hidden")
}

function showLogin(){
registerBox.classList.add("hidden")
loginBox.classList.remove("hidden")
}

async function register(){

const email = regEmail.value
const pass = regPass.value
const pass2 = regPass2.value

if(pass !== pass2){
passError.innerText = "Passwords do not match"
return
}

passError.innerText = ""

const { data, error } = await supabase.auth.signUp({
email: email,
password: pass
})

if(error){
alert(error.message)
return
}

await supabase.from("users").insert([
{
id: data.user.id,
email: email,
credit: 0
}
])

alert("Account created successfully")

showLogin()

}

async function login(){

const email = loginEmail.value
const pass = loginPass.value

const { data, error } = await supabase.auth.signInWithPassword({
email: email,
password: pass
})

if(error){
alert(error.message)
return
}

localStorage.setItem("user",JSON.stringify(data.user))

window.location.href = "shop.html"

}

</script>

</body>
</html>
