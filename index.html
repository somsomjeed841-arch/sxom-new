<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SXOM Auth</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: 'Segoe UI', sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#d8ccc2;
}

.card{
width:380px;
padding:40px;
border-radius:20px;
background:#f3eee9;
box-shadow:0 20px 40px rgba(0,0,0,0.15);
text-align:center;
}

h2{
margin-bottom:20px;
color:#3e2f27;
}

input{
width:100%;
padding:12px;
margin:8px 0;
border-radius:10px;
border:1px solid #d4c4b8;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:#8c6b5a;
color:white;
font-weight:600;
cursor:pointer;
}

.switch{
margin-top:15px;
font-size:14px;
}

.switch span{
color:#8c6b5a;
cursor:pointer;
font-weight:600;
}

.hidden{
display:none;
}

.error{
color:red;
font-size:13px;
margin-top:5px;
}
</style>
</head>

<body>

<div class="card">

<div id="loginBox">
<h2>Sign In</h2>

<input id="loginEmail" type="email" placeholder="Email">
<input id="loginPass" type="password" placeholder="Password">

<button onclick="login()">LOGIN</button>

<div class="switch">
Don't have an account?
<span onclick="showRegister()">Create Account</span>
</div>

</div>


<div id="registerBox" class="hidden">

<h2>Create Account</h2>

<input id="regEmail" type="email" placeholder="Email">
<input id="regPass" type="password" placeholder="Password">
<input id="regPass2" type="password" placeholder="Confirm Password">

<div id="passError" class="error"></div>

<button onclick="register()">REGISTER</button>

<div class="switch">
Already have an account?
<span onclick="showLogin()">Sign In</span>
</div>

</div>

</div>


<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const supabase = window.supabase.createClient(
"https://uvbkeujfmzfhstxxpzvn.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJqanRrc3JqYmlpZmdmZmhlZmR0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0NTE0MTcsImV4cCI6MjA4ODAyNzQxN30.36PRBK4fxC2rA-VMvQVfI_p0U4BVsO3pGY38e31XZAI"
)

const loginBox = document.getElementById("loginBox")
const registerBox = document.getElementById("registerBox")

const regEmail = document.getElementById("regEmail")
const regPass = document.getElementById("regPass")
const regPass2 = document.getElementById("regPass2")
const passError = document.getElementById("passError")

const loginEmail = document.getElementById("loginEmail")
const loginPass = document.getElementById("loginPass")


window.showRegister = function(){
loginBox.classList.add("hidden")
registerBox.classList.remove("hidden")
}

window.showLogin = function(){
registerBox.classList.add("hidden")
loginBox.classList.remove("hidden")
}


window.register = async function(){

if(regPass.value !== regPass2.value){
passError.innerText = "Passwords do not match"
return
}

passError.innerText = ""

const { data, error } = await supabase.auth.signUp({
email: regEmail.value,
password: regPass.value
})

if(error){
alert(error.message)
return
}

await supabase.from("users").insert([
{
id: data.user.id,
email: regEmail.value,
credit: 0
}
])

alert("Account created")

showLogin()

}


window.login = async function(){

const { data, error } = await supabase.auth.signInWithPassword({
email: loginEmail.value,
password: loginPass.value
})

if(error){
alert(error.message)
return
}

localStorage.setItem("user",JSON.stringify(data.user))

window.location.href = "shop.html"

}

</script>

</body>
</html>
