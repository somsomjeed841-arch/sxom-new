<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>My Cart</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI', sans-serif;
  background:#d8ccc2;
}

.container{
  max-width:1000px;
  margin:60px auto;
  background:#f3eee9;
  padding:40px;
  border-radius:25px;
  box-shadow:0 20px 50px rgba(0,0,0,0.2);
}

.cart-item{
  display:flex;
  align-items:center;
  gap:20px;
  margin-bottom:20px;
  padding:15px;
  background:white;
  border-radius:15px;
}

.cart-item img{
  width:120px;
  border-radius:10px;
}

.price{
  font-weight:600;
  color:#8c6b5a;
}

.total{
  text-align:right;
  font-size:20px;
  font-weight:600;
  margin-top:30px;
}
</style>
</head>
<body>

<div class="container">
  <h2>My Cart 🛒</h2>
  <div id="cartItems"></div>
  <div class="total" id="totalPrice"></div>
  <button onclick="checkout()" style="
    margin-top:20px;
    padding:12px 20px;
    background:#3e2f27;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
  ">
  Checkout
  </button>
</div>

  <script src="/env.js"></script>
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

/* 🔥 Firebase config (ใส่เหมือนใน payment.html) */
const firebaseConfig = {
  apiKey: "AIzaSyAjikaFq20fAoypR-J-OSJdqPAWMLXGHVg",
  authDomain: "sxom-new.firebaseapp.com",
  projectId: "sxom-new"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

/* 🔥 Supabase */
const SUPABASE_URL = window.SUPABASE_URL;
const SUPABASE_KEY = window.SUPABASE_KEY;
  const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

/* 🔐 บังคับ login */
let currentUser = null;

onAuthStateChanged(auth, (user)=>{
  if(!user){
    window.location.href = "index.html";
  } else {
    currentUser = user;
  }
});

/* 🛒 โหลดสินค้า */
const cart = JSON.parse(localStorage.getItem("cart")) || [];
const cartContainer = document.getElementById("cartItems");

let total = 0;

if(cart.length === 0){
  cartContainer.innerHTML = "<p>Your cart is empty.</p>";
}else{
  cart.forEach((item, index) => {

    total += item.price * item.qty;

    cartContainer.innerHTML += `
      <div class="cart-item">
        <img src="${item.img}">
        <div style="flex:1;">
          <h3>${item.name}</h3>
          <div class="price">฿${item.price}</div>
          <div>
            <button onclick="decreaseQty(${index})">-</button>
            <span style="margin:0 10px">${item.qty}</span>
            <button onclick="increaseQty(${index})">+</button>
          </div>
        </div>
        <button onclick="removeItem(${index})"
        style="background:#a94442;color:white;border:none;padding:8px 12px;border-radius:8px;cursor:pointer;">
        Remove</button>
      </div>
    `;
  });

  document.getElementById("totalPrice").innerText =
    "Total: ฿" + total;
}

/* ปุ่มต้องผูกกับ window เพราะใช้ module */
window.removeItem = function(index){
  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  cart.splice(index, 1);
  localStorage.setItem("cart", JSON.stringify(cart));
  location.reload();
};

window.increaseQty = function(index){
  let cart = JSON.parse(localStorage.getItem("cart"));
  cart[index].qty += 1;
  localStorage.setItem("cart", JSON.stringify(cart));
  location.reload();
};

window.decreaseQty = function(index){
  let cart = JSON.parse(localStorage.getItem("cart"));
  if(cart[index].qty > 1){
    cart[index].qty -= 1;
  }
  localStorage.setItem("cart", JSON.stringify(cart));
  location.reload();
};

/* 🔥 Checkout */
window.checkout = async function(){

  if(!currentUser){
    alert("กรุณา Login ก่อน");
    return;
  }

  if(cart.length === 0){
    alert("ไม่มีสินค้า");
    return;
  }

  const { data: profile, error } = await supabase
    .from("profiles")
    .select("balance")
    .eq("id", currentUser.uid)
    .single();

  if(error || !profile){
    alert("ดึงข้อมูลผู้ใช้ไม่สำเร็จ");
    return;
  }

  if(profile.balance < total){
    alert("เงินไม่พอ ❌");
    return;
  }

  // หักเงิน
  await supabase
    .from("profiles")
    .update({ balance: profile.balance - total })
    .eq("id", currentUser.uid);

  // บันทึก order
  for(const item of cart){
    await supabase.from("orders").insert([
      {
        user_id: currentUser.uid,
        product_name: item.name,
        price: item.price * item.qty,
        status: "success"
      }
    ]);
  }

  localStorage.removeItem("cart");

  alert("สั่งซื้อสำเร็จ ✅");
  window.location.href = "dashboard.html";
};

</script>

</body>
</html>
