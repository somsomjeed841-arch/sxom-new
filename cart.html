<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>My Cart</title>

<style>
body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:#d8ccc2;
}

.container{
max-width:1000px;
margin:60px auto;
background:#f3eee9;
padding:40px;
border-radius:25px;
box-shadow:0 20px 50px rgba(0,0,0,0.2);
}

.cart-item{
display:flex;
align-items:center;
gap:20px;
margin-bottom:20px;
padding:15px;
background:white;
border-radius:15px;
}

.cart-item img{
width:120px;
border-radius:10px;
}

.price{
font-weight:600;
color:#8c6b5a;
}

.total{
text-align:right;
font-size:20px;
font-weight:600;
margin-top:30px;
}
</style>
</head>

<body>

<div class="container">

<h2>My Cart 🛒</h2>

<div id="cartItems"></div>

<div class="total" id="totalPrice"></div>

<button onclick="checkout()" style="
margin-top:20px;
padding:12px 20px;
background:#3e2f27;
color:white;
border:none;
border-radius:10px;
">
Checkout
</button>

</div>

<script src="env.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const supabase = window.supabase.createClient(
window.SUPABASE_URL,
window.SUPABASE_KEY
)

let currentUser=null

async function getUser(){

const {data:{user}} = await supabase.auth.getUser()

if(!user){
window.location.href="index.html"
return
}

currentUser=user

}

getUser()

let cart = JSON.parse(localStorage.getItem("cart")) || []

const cartContainer=document.getElementById("cartItems")

let total=0

function renderCart(){

cartContainer.innerHTML=""
total=0

if(cart.length===0){

cartContainer.innerHTML="<p>Your cart is empty</p>"
document.getElementById("totalPrice").innerText=""
return

}

cart.forEach((item,index)=>{

const qty=item.qty || 1

total += item.price * qty

cartContainer.innerHTML += `
<div class="cart-item">

<img src="${item.img}">

<div style="flex:1;">
<h3>${item.name}</h3>
<div class="price">฿${item.price}</div>

<div>
<button onclick="decreaseQty(${index})">-</button>
<span style="margin:0 10px">${qty}</span>
<button onclick="increaseQty(${index})">+</button>
</div>

</div>

<button onclick="removeItem(${index})"
style="background:#a94442;color:white;border:none;padding:8px 12px;border-radius:8px;">
Remove
</button>

</div>
`

})

document.getElementById("totalPrice").innerText =
"Total: ฿"+total.toLocaleString()

}

renderCart()

function removeItem(index){

cart.splice(index,1)

localStorage.setItem("cart",JSON.stringify(cart))

renderCart()

}

function increaseQty(index){

cart[index].qty = (cart[index].qty || 1) + 1

localStorage.setItem("cart",JSON.stringify(cart))

renderCart()

}

function decreaseQty(index){

if((cart[index].qty || 1) > 1){
cart[index].qty -= 1
}

localStorage.setItem("cart",JSON.stringify(cart))

renderCart()

}

async function checkout(){

if(!currentUser){
alert("กรุณา Login ก่อน")
return
}

if(cart.length===0){
alert("ไม่มีสินค้า")
return
}

const {data}=await supabase
.from("users")
.select("credit")
.eq("id",currentUser.id)
.single()

const balance=data?.credit ?? 0

if(balance < total){

alert("เงินไม่พอ ❌")
return

}

const newBalance = balance - total

await supabase
.from("users")
.update({credit:newBalance})
.eq("id",currentUser.id)

for(const item of cart){

await supabase
.from("orders")
.insert([
{
user_id:currentUser.id,
product:item.name,
price:item.price * (item.qty || 1)
}
])

}

localStorage.removeItem("cart")

alert("สั่งซื้อสำเร็จ ✅")

window.location.href="shop.html"

}

</script>

</body>
</html>
