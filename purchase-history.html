<!DOCTYPE html>
<html>
<head>
<title>Purchase History</title>
<style>
body{font-family:Arial;background:#f4f4f4;padding:40px;}
.card{background:white;padding:20px;border-radius:10px;margin-bottom:15px;box-shadow:0 3px 10px rgba(0,0,0,0.05);}
.product{font-size:18px;font-weight:bold;}
.price{color:green;font-weight:bold;}
.status{padding:5px 10px;border-radius:20px;font-size:12px;display:inline-block;margin-top:10px;}
.success{background:#d4edda;color:#155724;}
.pending{background:#fff3cd;color:#856404;}
.date{color:gray;font-size:13px;margin-top:5px;}
</style>
</head>
<body>

<h2>📦 ประวัติการสั่งซื้อ</h2>
<div id="orders"></div>

<script src="/env.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

const firebaseConfig={
apiKey:"AIzaSyAj1kaFq20fAoypR-J-OSJdqPAWMLXGHVg",
authDomain:"sxom-new.firebaseapp.com",
projectId:"sxom-new"
};

const app=initializeApp(firebaseConfig);
const auth=getAuth(app);
const supabase=createClient(window.SUPABASE_URL,window.SUPABASE_KEY);

onAuthStateChanged(auth,async(user)=>{

if(!user){
window.location.href="index.html";
return;
}

const {data}=await supabase
.from("orders")
.select("*")
.eq("user_id",user.uid)
.order("created_at",{ascending:false});

const div=document.getElementById("orders");

if(!data||data.length===0){
div.innerHTML="<p>ยังไม่มีประวัติการซื้อ</p>";
return;
}

data.forEach(order=>{
const statusClass=order.status==="success"?"success":"pending";

div.innerHTML+=`
<div class="card">
<div class="product">${order.product_name}</div>
<div class="price">฿${order.price}</div>
<div class="date">${new Date(order.created_at).toLocaleString()}</div>
<div class="status ${statusClass}">${order.status}</div>
</div>
`;
});

});
</script>

</body>
</html>
