<!DOCTYPE html>
<html lang="th">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #d8ccc2;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            width: 500px;
            background: #f3eee9;
            padding: 40px;
            border-radius: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            text-align: center;
        }

        .profile-logo {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            margin: 0 auto 20px auto;
            display: block;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        h2 {
            margin-bottom: 10px;
            color: #3e2f27;
        }

        .info {
            margin-top: 20px;
            text-align: left;
            font-size: 15px;
            color: #3e2f27;
        }

        .info div {
            margin-bottom: 12px;
            padding: 10px;
            background: #ede5df;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .info span {
            font-weight: bold;
            color: #8c6b5a;
            word-break: break-all;
            margin-left: 10px;
        }

        button {
            margin-top: 25px;
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            background: #8c6b5a;
            color: white;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }

        button:hover {
            background: #3e2f27;
        }
    </style>
</head>
