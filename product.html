<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Product Detail</title>

<style>

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:#d8ccc2;
}

.container{
max-width:1000px;
margin:60px auto;
background:#f3eee9;
border-radius:25px;
padding:40px;
box-shadow:0 20px 50px rgba(0,0,0,0.2);
}

.product-layout{
display:flex;
gap:50px;
flex-wrap:wrap;
}

.left{
flex:1;
}

.left img{
width:100%;
border-radius:20px;
}

.right{
flex:1;
}

.right h2{
margin-bottom:15px;
color:#3e2f27;
}

.price{
font-size:22px;
font-weight:600;
color:#8c6b5a;
margin-bottom:25px;
}

button{
padding:12px 20px;
border:none;
border-radius:10px;
cursor:pointer;
margin-right:10px;
font-size:14px;
}

.add{
background:#8c6b5a;
color:white;
}

.buy{
background:#3e2f27;
color:white;
}

</style>
</head>

<body>

<div class="container">

<div class="product-layout">

<div class="left">
<img id="productImg">
</div>

<div class="right">
<h2 id="productName"></h2>
<div class="price" id="productPrice"></div>

<button class="add" onclick="addToCart()">Add To Cart</button>
<button class="buy" onclick="buyNow()">Buy Now</button>

</div>

</div>

</div>

<script src="env.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const supabase = window.supabase.createClient(
window.SUPABASE_URL,
window.SUPABASE_KEY
)

let user = null
let product = null

async function getUser(){

const {data:{user:u}} = await supabase.auth.getUser()

if(!u){
window.location.href="index.html"
return
}

user = u

}

getUser()

/* ------------------------
PRODUCT DATABASE
------------------------ */

const products = {

"Nitro":[
{
name:"Discord Nitro 1 Month",
price:59,
img:"ni1m.PNG"
},
{
name:"Discord Nitro 3 Month",
price:149,
img:"ni3m.PNG"
}
],

"Discord":[
{
name:"Discord Account",
price:35,
img:"discord1.png"
}
],

"BOT Discord":[
{
name:"Premium Discord Bot",
price:120,
img:"bot1.png"
}
],

"BOT Trading EA":[
{
name:"Forex Trading EA",
price:599,
img:"ea1.png"
}
],

"Reshade":[
{
name:"GTA Reshade Pack",
price:45,
img:"reshade1.png"
}
]

}

/* ------------------------
GET URL PARAM
------------------------ */

const params = new URLSearchParams(window.location.search)

const category = params.get("cat")
const name = params.get("name")

if(products[category]){

product = products[category].find(p => p.name === name)

}

if(product){

document.getElementById("productName").innerText = product.name
document.getElementById("productPrice").innerText = "฿"+product.price
document.getElementById("productImg").src = product.img

}

/* ------------------------
CART
------------------------ */

function addToCart(){

let cart = JSON.parse(localStorage.getItem("cart")) || []

cart.push({
name:product.name,
price:product.price,
img:product.img
})

localStorage.setItem("cart",JSON.stringify(cart))

alert("Added to cart")

}

/* ------------------------
BUY
------------------------ */

async function buyNow(){

const {data} = await supabase
.from("users")
.select("credit")
.eq("id",user.id)
.single()

const balance = data?.credit ?? 0

if(balance < product.price){

alert("ยอดเงินไม่พอ")
return

}

const newBalance = balance - product.price

await supabase
.from("users")
.update({credit:newBalance})
.eq("id",user.id)

await supabase
.from("orders")
.insert([
{
user_id:user.id,
product:product.name,
price:product.price
}
])

alert("Purchase successful")

window.location.href="profile.html"

}

</script>

</body>
</html>
