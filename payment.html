<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Topup</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:system-ui;
}

body{
background:#0e0e0e;
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.container{
width:100%;
max-width:420px;
background:#141414;
border-radius:20px;
padding:25px;
box-shadow:0 20px 60px rgba(0,0,0,.6);
}

h2{
text-align:center;
margin-bottom:20px;
}

.tabs{
display:flex;
background:#1f1f1f;
border-radius:12px;
overflow:hidden;
margin-bottom:20px;
}

.tab{
flex:1;
padding:12px;
text-align:center;
cursor:pointer;
font-weight:600;
font-size:14px;
color:#aaa;
}

.tab.active{
background:#2a2a2a;
color:white;
}

.method{
display:none;
}

.method.active{
display:block;
}

.card{
background:#1b1b1b;
border-radius:15px;
padding:15px;
margin-bottom:15px;
text-align:center;
}

.card img{
width:100%;
border-radius:10px;
}

.wallet-input{
margin-top:15px;
}

.wallet-input input{
width:100%;
padding:12px;
border-radius:10px;
border:none;
background:#222;
color:white;
}

.bank-info{
font-size:14px;
line-height:1.8;
text-align:left;
}

.copy{
background:#2b2b2b;
padding:8px 12px;
border-radius:8px;
cursor:pointer;
font-size:12px;
display:inline-block;
margin-top:5px;
}

.upload{
margin-top:20px;
border:2px dashed #333;
border-radius:15px;
padding:25px;
text-align:center;
cursor:pointer;
}

.upload input{
display:none;
}

.upload button{
margin-top:10px;
background:#333;
border:none;
color:white;
padding:8px 15px;
border-radius:8px;
}

.verify{
margin-top:15px;
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#00c853;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

.status{
margin-top:10px;
text-align:center;
font-size:14px;
min-height:20px;
}

</style>

</head>

<body>

<div class="container">

<h2>เติมเงิน</h2>

<div class="tabs">
<div class="tab active" onclick="switchTab(event,'bank')">🏦 Mobile Banking</div>
<div class="tab" onclick="switchTab(event,'wallet')">💳 TrueMoney</div>
</div>

<div id="bank" class="method active">

<div class="card">
<img src="QRCode_20260302224649.png">
</div>

<div class="card bank-info">

ชื่อบัญชี<br>
<b>Titaree Hanprap</b><br>

ธนาคาร<br>
<b>กรุงไทย</b><br>

เลขบัญชี<br>
<b id="acc">398-3-48272-4</b><br>

<div class="copy" onclick="copyAcc()">คัดลอกเลขบัญชี</div>

</div>

</div>

<div id="wallet" class="method">

<div class="card">
<img src="IMG_0517.png">
</div>

<div class="wallet-input">
<input id="giftlink" placeholder="https://gift.truemoney.com/campaign/?v=xxxxxxxx">
</div>

</div>

<label class="upload">

ลาก & วาง เพื่ออัปโหลดสลิป
<br>

<button type="button">อัปโหลดไฟล์</button>

<input type="file" id="slip" accept="image/*">

</label>

<button class="verify" onclick="verify()">ตรวจสอบสลิป</button>

<div id="status" class="status"></div>

</div>

<script src="/env.js"></script>

<script type="module">

import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'

const supabase = createClient(
window.SUPABASE_URL,
window.SUPABASE_KEY
)

const { data:{session} } = await supabase.auth.getSession()

if(!session){
location.href="index.html"
}

window.switchTab=function(e,id){

document.querySelectorAll(".tab")
.forEach(t=>t.classList.remove("active"))

document.querySelectorAll(".method")
.forEach(m=>m.classList.remove("active"))

e.target.classList.add("active")

document.getElementById(id)
.classList.add("active")

}

window.copyAcc=function(){

const acc=document.getElementById("acc").innerText

navigator.clipboard.writeText(acc)

alert("คัดลอกเลขบัญชีแล้ว")

}

window.verify=async function(){

const file=document.getElementById("slip").files[0]

const status=document.getElementById("status")

if(!file){

alert("กรุณาเลือกสลิป")

return

}

status.innerText="กำลังตรวจสอบ..."

const formData=new FormData()

formData.append("file",file)
formData.append("uid",session.user.id)

const res=await fetch("/api/verify-slip",{
method:"POST",
body:formData
})

const data=await res.json()

if(data.success){

status.style.color="lime"
status.innerText="เติมเงินสำเร็จ"

setTimeout(()=>{

location.href="profile.html"

},1500)

}else{

status.style.color="red"
status.innerText=data.message || "สลิปไม่ถูกต้อง"

}

}

</script>

</body>
</html>
